openapi: 3.0.3
info:
  title: Fess - User API
  description: |-
    This is a Fess Server based on the OpenAPI 3.0 specification.

    ## JSONP

    When `api.jsonp.enabled=true` is set on the server, **every GET endpoint**
    in this API accepts an optional `callback` query parameter. When present,
    the response body is wrapped as `callback(<json>);` and served with a
    JavaScript content type instead of `application/json`. Only the
    `/documents` GET operation documents the `callback` parameter explicitly,
    but the same behavior applies uniformly to `/documents/all`, `/labels`,
    `/popular-words`, `/suggest-words`, `/favorites`, `/documents/{docId}/favorite`
    (GET-style endpoints) and `/health`. JSONP is disabled by default.

    ## Referer gate

    A subset of endpoints (`/documents/all`, `/suggest-words`) is gated by
    `web.api.json.referer.hosts`. When that property is set, requests whose
    `Referer` header host is not on the allowlist are rejected with HTTP 400
    and body `{"message":"Referer is invalid."}`. See per-operation notes.

    ## RAG chat (AI search mode)

    The `/chat` and `/chat/stream` endpoints power the AI (RAG) search mode.
    They are available only when `rag.chat.enabled=true`; when the feature is
    disabled the endpoints are not registered and requests fall through
    (typically HTTP 404). `/chat` returns a JSON body, while `/chat/stream`
    returns a Server-Sent Events (`text/event-stream`) stream. Chat error
    bodies use the shape `{"status":"error","message":"..."}` (distinct from
    the `Error` schema used by the search endpoints), and JSONP (`callback`)
    does not apply to either chat endpoint.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 15.7.0
externalDocs:
  description: API Documentation
  url: https://fess.codelibs.org/15.7/api/
servers:
  - url: http://localhost:8080/api/v1
tags:
  - name: search
    description: "Search operations"
  - name: popularword
    description: "Popular word operations"
  - name: monitor
    description: "Monitoring operations"
  - name: suggest
    description: "Suggest operations"
  - name: favorite
    description: "Favorite operations"
  - name: chat
    description: "RAG chat operations (AI search mode)"
paths:
  /documents:
    get:
      tags:
        - search
      summary: Finds documents by query
      description: Finds documents by search conditions
      operationId: searchDocuments
      parameters:
        - name: q
          in: query
          description: Search words
          required: false
          schema:
            type: string
            example: Fess
        - name: start
          in: query
          description: Start position
          required: false
          schema:
            type: integer
            minimum: 0
            exclusiveMinimum: false
            default: 0
            example: 0
        - name: offset
          in: query
          description: Offset from a start position
          required: false
          schema:
            type: integer
            minimum: 0
            exclusiveMinimum: false
            default: 0
            example: 0
        - name: num
          in: query
          description: The number of returned documents as a search result
          required: false
          schema:
            type: integer
            minimum: 0
            exclusiveMinimum: false
            maximum: 100
            exclusiveMaximum: false
            default: 20
            example: 20
        - name: sort
          in: query
          description: Sorted field name
          required: false
          schema:
            type: string
            example: score
        - name: fields.label
          in: query
          description: Filtered label name
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
            example: [name]
        - name: facet.field
          in: query
          description: Facet field name
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
            example: [label]
        - name: facet.query
          in: query
          description: Facet query
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
            example: ["timestamp:[now/d-1d TO *]"]
        - name: facet.size
          in: query
          description: Item size in facets returned by facet.field
          required: false
          schema:
            type: integer
            minimum: 0
            exclusiveMinimum: false
            default: 10
            example: 10
        - name: facet.minDocCount
          in: query
          description: Minumum document size in facets
          required: false
          schema:
            type: integer
            minimum: 0
            exclusiveMinimum: false
            default: 0
            example: 0
        - name: geo.{geoField}.point
          in: query
          description: |-
            Latitude and Longitude for Geo search. `{geoField}` is a
            placeholder — substitute one of the configured geo field names
            from `query.geo.fields` (default: `location`). For example, with
            the default config the actual parameter name is
            `geo.location.point`. Parameters whose `{geoField}` does not
            match an entry in `query.geo.fields` are ignored.
          required: false
          schema:
            type: string
            example: 35.0,139.0
        - name: geo.{geoField}.distance
          in: query
          description: |-
            Distance for Geo search. `{geoField}` must match an entry in
            `query.geo.fields` (default: `location`); see
            `geo.{geoField}.point` above.
          required: false
          schema:
            type: string
            example: 10km
        - name: lang
          in: query
          description: Language
          required: false
          schema:
            type: string
            example: en
        - name: ex_q
          in: query
          description: Extra query expression; repeatable.
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: sdh
          in: query
          description: Similar-document hash.
          required: false
          schema:
            type: string
        - name: track_total_hits
          in: query
          description: |-
            Either `true`/`false` or an integer threshold. Forwarded to the
            search engine to control how `record_count` is computed; affects
            the value of `record_count_relation` in the response.
          required: false
          schema:
            type: string
            example: "true"
        - name: preference
          in: query
          description: String to specify a shard for searching
          required: false
          schema:
            type: string
            example: abc
        - name: callback
          in: query
          description: Callback name for using JSONP
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  q:
                    type: string
                    example: Fess
                  query_id:
                    type: string
                    example: bd60f9579a494dfd8c03db7c8aa905b0
                  exec_time:
                    type: number
                    example: 0.21
                  query_time:
                    type: integer
                    format: int64
                    example: 0
                  page_size:
                    type: integer
                    example: 20
                  page_number:
                    type: integer
                    example: 1
                  record_count:
                    type: integer
                    format: int64
                    example: 31625
                  record_count_relation:
                    type: string
                    description: |-
                      Whether `record_count` is exact or a lower bound. Reflects
                      the search engine's track-total-hits behavior.
                    enum: [EQUAL_TO, GREATER_THAN_OR_EQUAL_TO]
                    example: EQUAL_TO
                  page_count:
                    type: integer
                    example: 1
                  highlight_params:
                    type: string
                    example: "&hq=n2sm&hq=Fess"
                  next_page:
                    type: boolean
                    example: true
                  prev_page:
                    type: boolean
                    example: false
                  start_record_number:
                    type: integer
                    format: int64
                    example: 1
                  end_record_number:
                    type: integer
                    format: int64
                    example: 20
                  page_numbers:
                    type: array
                    items:
                      type: string
                    example: ["1", "2", "3", "4", "5"]
                  partial:
                    type: boolean
                    example: false
                  search_query:
                    type: string
                    example: "(Fess OR n2sm)"
                  requested_time:
                    type: integer
                    format: int64
                    example: 1507822131845
                  related_query:
                    type: array
                    items:
                      type: string
                    example: ["aaa"]
                  related_contents:
                    type: array
                    items:
                      type: string
                    example: []
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        filetype:
                          type: string
                          example: html
                        title:
                          type: string
                          example: "Open Source Enterprise Search Server: Fess — Fess 11.0 documentation"
                        content_title:
                          type: string
                          example: "Open Source Enterprise Search Server: Fess — Fe..."
                        digest:
                          type: string
                          example: "Docs » Open Source Enterprise Search Server: Fess Commercial Support Open Source Enterprise Search Server: Fess What is Fess ? Fess is very powerful and easily deployable Enterprise Search Server. ..."
                        host:
                          type: string
                          format: hostname
                          example: "fess.codelibs.org"
                        last_modified:
                          type: string
                          format: date-time
                          example: "2017-10-09T22:28:56.000Z"
                        content_length:
                          type: string
                          example: "29624"
                        timestamp:
                          type: string
                          format: date-time
                          example: "2017-10-09T22:28:56.000Z"
                        url_link:
                          type: string
                          example: "https://fess.codelibs.org/"
                        created:
                          type: string
                          format: date-time
                          example: "2017-10-10T15:00:48.609Z"
                        site_path:
                          type: string
                          example: "fess.codelibs.org/"
                        doc_id:
                          type: string
                          example: "e79fbfdfb09d4bffb58ec230c68f6f7e"
                        url:
                          type: string
                          format: uri
                          example: "https://fess.codelibs.org/"
                        content_description:
                          type: string
                          example: "Enterprise Search Server: <strong>Fess</strong> Commercial Support Open...Search Server: <strong>Fess</strong> What is <strong>Fess</strong> ? <strong>Fess</strong> is very powerful...You can install and run <strong>Fess</strong> quickly on any platforms...Java runtime environment. <strong>Fess</strong> is provided under Apache...Apache license. Demo <strong>Fess</strong> is Elasticsearch-based search"
                        site:
                          type: string
                          example: "fess.codelibs.org/"
                        boost:
                          type: string
                          example: "10.0"
                        mimetype:
                          type: string
                          example: "text/html"
                  facet_field:
                    type: array
                    description: |-
                      Present only when `facet.field` was supplied and the
                      search engine returned bucket results.
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          example: label
                        result:
                          type: array
                          items:
                            type: object
                            properties:
                              value:
                                type: string
                                example: aws
                              count:
                                type: integer
                                format: int64
                                example: 12
                  facet_query:
                    type: array
                    description: |-
                      Present only when `facet.query` was supplied.
                    items:
                      type: object
                      properties:
                        value:
                          type: string
                          example: "timestamp:[now/d-1d TO *]"
                        count:
                          type: integer
                          format: int64
                          example: 3
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /documents/all:
    get:
      tags:
        - search
      summary: Finds all documents by query
      description: |-
        Streams all matching documents as NDJSON via the scroll search API.
        Accepts the same query parameters as `GET /documents`.

        **Feature gate.** When `api.search.scroll=false` (default depends on
        deployment), this endpoint responds with HTTP 400 and body
        `{"message":"Scroll Search is not available."}`.

        **Referer gate.** When `web.api.json.referer.hosts` is configured,
        requests whose `Referer` header host is not on the allowlist are
        rejected with HTTP 400 and body `{"message":"Referer is invalid."}`.
      operationId: searchAllDocuments
      parameters:
        - name: q
          in: query
          description: Search words
          required: false
          schema:
            type: string
            example: Fess
        - name: start
          in: query
          description: Start position
          required: false
          schema:
            type: integer
            minimum: 0
            exclusiveMinimum: false
            default: 0
            example: 0
        - name: offset
          in: query
          description: Offset from a start position
          required: false
          schema:
            type: integer
            minimum: 0
            exclusiveMinimum: false
            default: 0
            example: 0
        - name: num
          in: query
          description: The number of returned documents as a search result
          required: false
          schema:
            type: integer
            minimum: 0
            exclusiveMinimum: false
            maximum: 100
            exclusiveMaximum: false
            default: 20
            example: 20
        - name: sort
          in: query
          description: Sorted field name
          required: false
          schema:
            type: string
            example: score
        - name: fields.label
          in: query
          description: Filtered label name
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
            example: [name]
        - name: facet.field
          in: query
          description: Facet field name
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
            example: [label]
        - name: facet.query
          in: query
          description: Facet query
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
            example: ["timestamp:[now/d-1d TO *]"]
        - name: facet.size
          in: query
          description: Item size in facets returned by facet.field
          required: false
          schema:
            type: integer
            minimum: 0
            exclusiveMinimum: false
            default: 10
            example: 10
        - name: facet.minDocCount
          in: query
          description: Minumum document size in facets
          required: false
          schema:
            type: integer
            minimum: 0
            exclusiveMinimum: false
            default: 0
            example: 0
        - name: geo.{geoField}.point
          in: query
          description: |-
            Latitude and Longitude for Geo search. `{geoField}` is a
            placeholder — substitute one of the configured geo field names
            from `query.geo.fields` (default: `location`). For example, with
            the default config the actual parameter name is
            `geo.location.point`. Parameters whose `{geoField}` does not
            match an entry in `query.geo.fields` are ignored.
          required: false
          schema:
            type: string
            example: 35.0,139.0
        - name: geo.{geoField}.distance
          in: query
          description: |-
            Distance for Geo search. `{geoField}` must match an entry in
            `query.geo.fields` (default: `location`); see
            `geo.{geoField}.point` above.
          required: false
          schema:
            type: string
            example: 10km
        - name: lang
          in: query
          description: Language
          required: false
          schema:
            type: string
            example: en
        - name: ex_q
          in: query
          description: Extra query expression; repeatable.
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: sdh
          in: query
          description: Similar-document hash.
          required: false
          schema:
            type: string
        - name: track_total_hits
          in: query
          description: |-
            Either `true`/`false` or an integer threshold. Forwarded to the
            search engine to control how `record_count` is computed; affects
            the value of `record_count_relation` in the response.
          required: false
          schema:
            type: string
            example: "true"
        - name: preference
          in: query
          description: String to specify a shard for searching
          required: false
          schema:
            type: string
            example: abc
        - name: callback
          in: query
          description: Callback name for using JSONP
          required: false
          schema:
            type: string
      responses:
        '200':
          description: |-
            NDJSON stream. Each line is one document object. If the handler
            fails after at least one line has been written it appends a final
            line of the form `{"error":{"error_code":"<uuid>","message":"..."}}`
            and closes the stream; clients MUST inspect the last line.
          content:
            application/x-ndjson:
              schema:
                type: string
        '400':
          description: |-
            Bad request. In addition to the generic `Error` shape, this
            endpoint emits two specific 400 bodies:
            * `{"message":"Scroll Search is not available."}` when
              `api.search.scroll=false`.
            * `{"message":"Referer is invalid."}` when the request `Referer`
              host is not on the `web.api.json.referer.hosts` allowlist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /labels:
    get:
      tags:
        - search
      summary: List labels
      description: Returns available labels
      operationId: listLabels
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  record_count:
                    type: integer
                    example: 9
                  data:
                    type: array
                    description: Omitted entirely when no labels are configured.
                    items:
                      type: object
                      properties:
                        label:
                          type: string
                          example: AWS
                        value:
                          type: string
                          example: aws
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /favorites:
    get:
      tags:
        - favorite
      summary: List favorites
      description: Returns favorited document IDs
      operationId: listFavorites
      parameters:
        - name: queryId
          in: query
          description: Query ID where the document is contained
          required: true
          schema:
            type: string
            example: queryid
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  record_count:
                    type: integer
                    example: 9
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        doc_id:
                          type: string
                          example: "e79fbfdfb09d4bffb58ec230c68f6f7e"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /documents/{docId}/favorite:
    post:
      tags:
        - favorite
      summary: Set a favorite mark
      description: Set a favorite mark to the document
      operationId: setFavorite
      parameters:
        - name: docId
          in: path
          description: Document ID to be favorited
          required: true
          schema:
            type: string
            example: documentid
        - name: queryId
          in: query
          description: Query ID where the document is contained
          required: true
          schema:
            type: string
            example: queryid
      responses:
        '201':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    example: created
        '400':
          description: |-
            Bad request. Returned in any of the following cases:
            * the favorite feature is disabled (`user.favorite=false`);
            * `docId` path parameter is missing or empty;
            * no authenticated user session is present;
            * the URL bound to `docId` cannot be resolved or is blank;
            * `queryId` was not previously issued by `GET /documents`
              (no matching prior query ID is known to the server).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /popular-words:
    get:
      tags:
        - popularword
      summary: List popular words
      description: Returns available labels
      operationId: listPopularWords
      parameters:
        - name: seed
          in: query
          description: Random seed to return popular words
          required: false
          schema:
            type: string
            example: "123"
        - name: label
          in: query
          description: Filtered label name
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
            example: [label]
        - name: field
          in: query
          description: Field name to generate suggest words
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
            example: [python]
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  record_count:
                    type: integer
                    example: 9
                  data:
                    type: array
                    items:
                      type: string
                    example: ["python"]
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /health:
    get:
      tags:
        - monitor
      summary: Check a server status
      description: |-
        Returns the search engine cluster health. HTTP `200` is returned for
        cluster status `green`/`yellow`; `503` is returned for `red`.
      operationId: ping
      responses:
        '200':
          description: Cluster is reachable (status `green` or `yellow`).
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    description: |-
                      Cluster health snapshot. The exact set of fields
                      included is governed by the `api.ping.es.fields`
                      configuration property — additional numeric fields
                      such as `number_of_nodes`, `active_primary_shards`,
                      `active_shards`, `relocating_shards`,
                      `initializing_shards`, `unassigned_shards`, etc., may
                      be present in the response. The properties listed
                      below are always emitted; any other entries
                      configured via `api.ping.es.fields` are surfaced as
                      additional properties.
                    additionalProperties: true
                    properties:
                      cluster_name:
                        type: string
                        example: fess
                      status:
                        type: string
                        enum: [green, yellow, red]
                        example: green
                      timed_out:
                        type: boolean
                        example: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          description: Cluster status is `red`.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    description: |-
                      Same shape as the 200 response `data` object. The
                      exact set of fields is governed by
                      `api.ping.es.fields`; see the 200 description.
                    additionalProperties: true
                    properties:
                      cluster_name:
                        type: string
                        example: fess
                      status:
                        type: string
                        enum: [green, yellow, red]
                        example: red
                      timed_out:
                        type: boolean
                        example: false

  /suggest-words:
    get:
      tags:
        - suggest
      summary: Finds suggest words
      description: |-
        Returns words for suggest.

        **Referer gate.** When `web.api.json.referer.hosts` is configured,
        requests whose `Referer` header host is not on the allowlist are
        rejected with HTTP 400 and body `{"message":"Referer is invalid."}`.
      operationId: findSuggestWords
      parameters:
        - name: q
          in: query
          description: Inputting characters for search
          required: true
          schema:
            type: string
            example: fe
        - name: num
          in: query
          description: The number of suggest words
          required: false
          schema:
            type: integer
            minimum: 0
            exclusiveMinimum: false
            example: 10
            default: 10
        - name: label
          in: query
          description: Filtered label name
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
            example: [label]
        - name: field
          in: query
          description: Field name to generate suggest words
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
            example: [python]
        - name: lang
          in: query
          description: Target language
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
            example: [en]
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  query_time:
                    type: integer
                    format: int64
                    example: 18
                  record_count:
                    type: integer
                    example: 355
                  page_size:
                    type: integer
                    example: 10
                  data:
                    type: array
                    description: Omitted entirely when no suggestions are returned.
                    items:
                      type: object
                      properties:
                        text:
                          type: string
                          example: fess
                        labels:
                          type: array
                          items:
                            type: string
                          example: [java, python]
        '400':
          description: |-
            Bad request. In addition to the generic `Error` shape, this
            endpoint emits `{"message":"Referer is invalid."}` when the
            request `Referer` host is not on the
            `web.api.json.referer.hosts` allowlist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /chat:
    post:
      tags:
        - chat
      summary: One-shot RAG chat completion
      description: |-
        Synchronous Retrieval-Augmented Generation (RAG) chat completion used
        by the AI search mode. The conversation is identified by `sessionId`;
        when omitted the server creates one and returns it in the response.

        **Feature gate.** Available only when `rag.chat.enabled=true`. When the
        feature is disabled the endpoint is not registered and the request
        falls through (typically HTTP 404).

        **Parameter transport.** Parameters are read via the servlet
        `getParameter` API, so they may be supplied either in the query string
        or as an `application/x-www-form-urlencoded` request body.

        **Clearing a session.** Send `clear=true` together with a non-blank
        `sessionId` and a blank `message` to delete the conversation history
        instead of generating a reply.

        Values supplied in `fields.label` or `ex_q` that are not present in the
        configured allowlists are dropped silently from the resolved request.
      operationId: chat
      parameters:
        - name: message
          in: query
          description: |-
            Chat message. Required for a normal completion; may be blank only
            when clearing a session (see `clear`). Rejected with HTTP 400 when
            longer than `rag.chat.message.max.length` characters (default 4000).
          required: false
          schema:
            type: string
            example: What is Fess?
        - name: sessionId
          in: query
          description: |-
            Conversation session ID. When omitted, the server creates a new
            session and returns its ID in the response.
          required: false
          schema:
            type: string
            example: 1a2b3c4d5e6f
        - name: clear
          in: query
          description: |-
            When set to `true` with a non-blank `sessionId` and a blank
            `message`, the conversation history for that session is cleared.
          required: false
          schema:
            type: string
            enum: ["true"]
        - name: fields.label
          in: query
          description: |-
            Restricts retrieval to allowlisted label values; repeatable. Values
            not present in the configured label set are ignored.
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
            example: [name]
        - name: ex_q
          in: query
          description: |-
            Allowlisted facet query expressions; repeatable. Values not present
            in the configured facet query set are ignored. Values belonging to
            the same facet query view are OR-joined into a single clause.
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: |-
            Successful chat completion, or a successful session clear (when
            `clear=true` was supplied — in that case `content` is
            `"Session cleared"` and `sources` is absent).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          description: |-
            Bad request. Returned when `message` is blank (and the request is
            not a session clear), or when `message` exceeds
            `rag.chat.message.max.length`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatError'
        '404':
          description: |-
            The session targeted by `clear=true` was not found or is not owned
            by the current user. Body is
            `{"status":"error","message":"Session not found"}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatError'
        '405':
          description: |-
            Requested HTTP method is not allowed (only `POST` is accepted).
            Body is `{"status":"error","message":"Method not allowed"}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatError'
        '500':
          description: |-
            Internal server error. Body is
            `{"status":"error","message":"Internal server error"}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatError'

  /chat/stream:
    get:
      tags:
        - chat
      summary: Streaming RAG chat completion (SSE)
      description: |-
        Streaming variant of `POST /chat`, used by the AI search mode to render
        the answer progressively. The success response is a Server-Sent Events
        (`text/event-stream`) stream of named events:

        - `phase` — pipeline phase transition. On start:
          `{ phase, status: "start", message, keywords? }`. On completion:
          `{ phase, status: "complete", ... }` plus any additional non-reserved
          fields carried by the phase payload (the keys `phase` and `status`
          are reserved and never overridden).
        - `chunk` — partial generated text (`{ content }`). Emitted only for
          non-empty fragments.
        - `sources` — retrieved sources (`{ sources: [ChatSource] }`). Emitted
          only when at least one source was retrieved.
        - `retry` — transient failure backoff
          (`{ phase, operation, attempt, maxAttempts, sleepMs, cause? }`).
        - `waiting` — long-running phase progress
          (`{ phase, reason, elapsedMs, timeoutMs }`).
        - `fallback` — query rewrite or strategy fallback
          (`{ phase, reason, originalQuery?, newQuery? }`).
        - `warning` — recoverable warning (`{ phase, code, detail? }`).
        - `done` — end of stream (`{ sessionId, htmlContent? }`).
        - `error` — terminal mid-stream failure
          (`{ phase?, message, errorCode }`). For LLM errors `message` carries
          the same string as `errorCode`.

        **Feature gate.** Available only when `rag.chat.enabled=true`.

        **Parameter transport.** Parameters are read via `getParameter`, so for
        `POST` they may be supplied in the query string or as an
        `application/x-www-form-urlencoded` body.

        Pre-stream validation failures (missing/blank `message`, message too
        long, disallowed method) are returned as a JSON body
        `{"status":"error","message":"..."}` with the corresponding HTTP status
        instead of an SSE stream. Once streaming has begun, failures are
        delivered as an `error` SSE event rather than an HTTP error status.

        Values supplied in `fields.label` or `ex_q` that are not present in the
        configured allowlists are dropped silently.
      operationId: chatStream
      parameters:
        - name: message
          in: query
          description: |-
            Chat message. Required. Rejected with HTTP 400 when longer than
            `rag.chat.message.max.length` characters (default 4000).
          required: true
          schema:
            type: string
            example: What is Fess?
        - name: sessionId
          in: query
          description: |-
            Conversation session ID. When omitted, the server creates a new
            session and returns its ID in the `done` event.
          required: false
          schema:
            type: string
            example: 1a2b3c4d5e6f
        - name: fields.label
          in: query
          description: |-
            Restricts retrieval to allowlisted label values; repeatable. Values
            not present in the configured label set are ignored.
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
            example: [name]
        - name: ex_q
          in: query
          description: |-
            Allowlisted facet query expressions; repeatable. Values not present
            in the configured facet query set are ignored. Values belonging to
            the same facet query view are OR-joined into a single clause.
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: SSE stream of generation events.
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: phase
                  data: {"phase":"retrieval","status":"start","message":"Searching..."}

                  event: chunk
                  data: {"content":"Fess is "}

                  event: sources
                  data: {"sources":[{"index":0,"title":"Fess","url":"https://fess.codelibs.org/","docId":"abc","snippet":"...","urlLink":"https://fess.codelibs.org/","goUrl":"/go/..."}]}

                  event: done
                  data: {"sessionId":"1a2b3c4d5e6f","htmlContent":"<p>Fess is ...</p>"}
        '400':
          description: |-
            Bad request returned before the stream starts. Body is
            `{"status":"error","message":"..."}` (e.g. `Message is required` or
            `Message is too long (max 4000 characters)`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatError'
        '405':
          description: |-
            Requested HTTP method is not allowed (only `GET` and `POST` are
            accepted). Body is `{"status":"error","message":"Method not allowed"}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatError'
        '500':
          description: |-
            Internal server error before the stream starts. Body is
            `{"status":"error","message":"..."}`. Errors that occur after the
            stream has started are reported via an `error` SSE event instead.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatError'
    post:
      tags:
        - chat
      summary: Streaming RAG chat completion (SSE)
      description: |-
        Identical to `GET /chat/stream`; see that operation for the full event
        list and behavior. `POST` accepts the same parameters via the query
        string or an `application/x-www-form-urlencoded` body.
      operationId: chatStreamPost
      parameters:
        - name: message
          in: query
          description: |-
            Chat message. Required. Rejected with HTTP 400 when longer than
            `rag.chat.message.max.length` characters (default 4000).
          required: true
          schema:
            type: string
            example: What is Fess?
        - name: sessionId
          in: query
          description: |-
            Conversation session ID. When omitted, the server creates a new
            session and returns its ID in the `done` event.
          required: false
          schema:
            type: string
            example: 1a2b3c4d5e6f
        - name: fields.label
          in: query
          description: |-
            Restricts retrieval to allowlisted label values; repeatable. Values
            not present in the configured label set are ignored.
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
            example: [name]
        - name: ex_q
          in: query
          description: |-
            Allowlisted facet query expressions; repeatable. Values not present
            in the configured facet query set are ignored. Values belonging to
            the same facet query view are OR-joined into a single clause.
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: SSE stream of generation events. See `GET /chat/stream`.
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          description: |-
            Bad request returned before the stream starts. Body is
            `{"status":"error","message":"..."}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatError'
        '405':
          description: |-
            Requested HTTP method is not allowed (only `GET` and `POST` are
            accepted). Body is `{"status":"error","message":"Method not allowed"}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatError'
        '500':
          description: |-
            Internal server error before the stream starts. Errors after the
            stream has started are reported via an `error` SSE event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatError'

components:
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Page not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    MethodNotAllowed:
      description: Requested HTTP method is not allowed for this endpoint.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      description: |-
        Error body shape. Which key is populated depends on
        `api.json.response.exception.included`:
        * `true`  — the response carries `message` with the exception
          detail (intended for development; never enable in production).
        * `false` (default) — the response carries the correlation ID
          under the key `error_code:` (note the **trailing colon in the
          JSON key**; this is the on-the-wire shape preserved for
          backward compatibility — see `SearchApiManager`). The value is
          a UUID that matches the server-side log entry.

        Exactly one of the two keys is present in any given response.
      properties:
        "error_code:":
          type: string
          description: |-
            Correlation ID logged on the server. UUID format. The key
            name includes a literal trailing colon character.
          example: "bd6b0bd6-0144-40bc-9567-c5751dd8eecb"
        message:
          type: string
          description: |-
            Human-readable exception detail. Present only when exception
            details are exposed via configuration.
          example: "This is an error message."
    ChatResponse:
      type: object
      description: |-
        Success body for `POST /chat`. Field names are emitted in camelCase
        (the handler serialises with a plain Jackson `ObjectMapper`).
      required:
        - status
        - sessionId
      properties:
        status:
          type: string
          enum: [ok]
          example: ok
        sessionId:
          type: string
          description: |-
            The session ID for the conversation. Echoes the request value or
            carries the server-generated ID when none was supplied.
          example: 1a2b3c4d5e6f
        content:
          type: string
          nullable: true
          description: |-
            The generated answer text. For a session-clear response this is the
            literal `"Session cleared"`. May be `null` when the model produced
            no content.
          example: "Fess is an open source enterprise search server."
        sources:
          type: array
          description: |-
            Documents referenced by the answer. Absent when the underlying
            message carries no sources (e.g. a session-clear response).
          items:
            $ref: '#/components/schemas/ChatSource'
    ChatError:
      type: object
      description: |-
        Error body for the chat endpoints. Distinct from the `Error` schema used
        by the search endpoints.
      required:
        - status
        - message
      properties:
        status:
          type: string
          enum: [error]
          example: error
        message:
          type: string
          description: Human-readable error message.
          example: "Message is required"
    ChatSource:
      type: object
      description: |-
        A document referenced by the chat answer. Serialised from the
        `ChatMessage.ChatSource` entity with a plain Jackson `ObjectMapper`, so
        every property is present (camelCase keys; unset values are `null`).
      properties:
        index:
          type: integer
          description: 0-based position of this source in the retrieved set.
          example: 0
        title:
          type: string
          nullable: true
          example: "Open Source Enterprise Search Server: Fess"
        url:
          type: string
          nullable: true
          example: "https://fess.codelibs.org/"
        docId:
          type: string
          nullable: true
          example: "e79fbfdfb09d4bffb58ec230c68f6f7e"
        snippet:
          type: string
          nullable: true
          example: "Fess is a very powerful and easily deployable enterprise search server."
        urlLink:
          type: string
          nullable: true
          description: The ViewHelper-processed URL for display.
          example: "https://fess.codelibs.org/"
        goUrl:
          type: string
          nullable: true
          description: The go-link URL for navigation with access control and click logging.
          example: "/go/e79fbfdfb09d4bffb58ec230c68f6f7e"
    
